seed: 2

method:
  name: baseline_avg # ours | baseline_avg | baseline_cagrad
  ours:
    lambda_align: 1.0e-3
    eps: 1.0e-8
    micro_batch_size: 8
    use_load_norm: true
  baseline_cagrad:
    c: 0.4
    inner_steps: 10
    inner_lr: 0.1
    eps: 1.0e-8

model:
  backbone_backend: hf # tiny | hf
  hf_load_pretrained: true
  hf_pretrained_name: microsoft/deberta-v3-base
  hf_local_files_only: false
  backbone: deberta # roberta | deberta | distilbert | gpt2
  expert_type: lora # lora | ffn
  routing_mode: softmax # softmax | topk
  top_k: 2
  vocab_size: 30522
  seq_len: 128
  max_seq_len: 128
  hidden_dim: 768
  dropout: 0.1
  num_classes: 2
  num_experts: 4
  lora_rank: 16
  lora_alpha: 16.0
  ffn_hidden_dim: 3072

train:
  steps: 500
  batch_size: 8 # effective per-task batch size; one task batch from each dataset forms one update
  micro_batch_size: 4 # logical micro batch for vote/conflict partition
  device_batch_size: 0 # GPU staging chunk only; grouped by whole logical micro-batches
  eval_every_steps: 50
  eval_max_batches: 0
  lr: 2.0e-5
  weight_decay: 0.01
  grad_clip: 1.0
  log_every: 10

data:
  source: textcls # synthetic | glue | textcls
  # Real datasets are large; cap for practical HPO throughput.
  train_size: 20000
  val_size: 4000
  datasets:
    - glue/sst2
    - yelp_polarity
    - amazon_polarity
